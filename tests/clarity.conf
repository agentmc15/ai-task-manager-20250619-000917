# /etc/nginx/conf.d/clarity.conf
# SSL termination and routing for clarity.onertx.com
#
# Routes:
#   /           → Nuxt frontend (localhost:3000)
#   /be/*       → FastAPI backend (localhost:4000)
#   /kc/*       → Keycloak (localhost:8080)
#   /auth/*     → Nuxt frontend (OIDC callback handled by Nuxt server)
#

server {
    listen 443 ssl;
    server_name clarity.onertx.com;

    ssl_certificate     /etc/nginx/ssl/clarity.crt;
    ssl_certificate_key /etc/nginx/ssl/clarity.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Backend API ---
    location /be/ {
        rewrite ^/be/(.*) /$1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Keycloak ---
    location /kc/ {
        proxy_pass http://127.0.0.1:8080/kc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # --- Frontend (everything else) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name clarity.onertx.com;
    return 301 https://$server_name$request_uri;
}
