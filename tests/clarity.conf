server {
    listen 80;
    server_name clarity.onertx.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name clarity.onertx.com;

    error_log /var/log/nginx/error.log debug;

    ssl_certificate /etc/letsencrypt/live/clarity.onertx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clarity.onertx.com/privkey.pem;

    # Health check for monitoring
    location /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Keycloak redirect (no trailing slash)
    location = /kc {
        return 301 https://clarity.onertx.com/kc/;
    }

    # Proxy /kc/* to Keycloak
    location /kc/ {
        proxy_pass http://127.0.0.1:8080/kc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Backend API redirect (no trailing slash)
    location = /be {
        return 301 https://clarity.onertx.com/be/;
    }

    # Backend API proxy - rewrites /be/* to /* before sending to FastAPI
    location /be/ {
        rewrite ^/be/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy everything else to Nuxt frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
